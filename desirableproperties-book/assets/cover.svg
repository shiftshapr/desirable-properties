<svg viewBox="0 0 420 600" xmlns="http://www.w3.org/2000/svg" aria-label="Desirable Properties book cover">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7e6a0"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9c7a1a"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="600" fill="url(#bgGrad)"/>
  <rect x="6" y="6" width="408" height="588" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  <rect x="14" y="14" width="392" height="572" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.6"/>
  <text x="210" y="120" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="0.4em" fill="#d4af37" font-weight="700">META-LAYER</text>
  <line x1="80" y1="138" x2="340" y2="138" stroke="#d4af37" stroke-width="0.8" opacity="0.5"/>
  <text x="210" y="240" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#goldGrad)">DESIRABLE</text>
  <text x="210" y="290" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#goldGrad)">PROPERTIES</text>
  <line x1="100" y1="320" x2="320" y2="320" stroke="#d4af37" stroke-width="0.8" opacity="0.5"/>
