<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Desirable Properties – A Book of the Meta-Layer. Twenty-two community-defined properties for decentralized digital infrastructure, inscribed on Bitcoin.">
  <meta name="theme-color" content="#0d1117">
  <meta name="color-scheme" content="dark light">
  <meta property="og:type" content="book">
  <meta property="og:title" content="The Desirable Properties of a Meta-Layer">
  <meta property="og:description" content="DP1–DP22 inscribed on Bitcoin. Twenty-two community-defined properties for decentralized digital infrastructure.">
  <meta property="og:url" content="https://desirableproperties.org/book">
  <meta property="og:site_name" content="Desirable Properties">
  <meta name="twitter:card" content="summary_large_image">
  <title>The Desirable Properties of a Meta-Layer</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="alternate icon" href="/assets/profile-icon.svg">
  <link rel="stylesheet" href="/assets/dp-site.css" />
  <style>
    :root, [data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #d4af37;
      --accent-hover: #e8c468;
      --accent-soft: rgba(212, 175, 55, 0.10);
      --accent-soft-2: rgba(212, 175, 55, 0.18);
    }
    [data-theme="light"] {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --text: #1f2328;
      --muted: #59636e;
      --accent: #b08d20;
      --accent-hover: #d4af37;
    }
    * { box-sizing: border-box; }
    html { height: 100%; }
    html, body {
      margin: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(212, 175, 55, 0.08), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    }
    .wrap {
      width: 100%;
      text-align: center;
      flex-shrink: 0;
      padding: 1rem 0;
    }
    .cover-hit {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      cursor: pointer;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      border-radius: 12px;
      padding: 16px;
      transition: filter 0.2s, transform 0.2s;
    }
    .cover-hit:hover,
    .cover-hit:focus-visible {
      filter: brightness(1.06);
      transform: translateY(-2px);
      outline: 2px solid var(--accent);
      outline-offset: 6px;
    }
    .cover-art {
      width: 100%;
      max-width: 480px;
      height: auto;
      aspect-ratio: 1 / 1;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
      box-shadow: 0 8px 36px rgba(212, 175, 55, 0.16);
      object-fit: contain;
    }
    .tagline {
      margin: 22px auto 0;
      max-width: 520px;
      font-size: 1rem;
      line-height: 1.55;
      color: var(--muted);
    }
    .start {
      display: inline-block;
      margin: 24px auto 0;
      padding: 12px 28px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #0d1117;
      font-weight: 600;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-decoration: none;
    }
    .start:hover { filter: brightness(1.10); }
    .meta {
      margin: 24px auto 0;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .meta a {
      color: var(--accent);
      text-decoration: none;
    }
    .meta a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap dp-container dp-container-narrow">
    <div class="cover-hit" id="coverHit" role="button" tabindex="0" aria-label="Open the book reader">
      <picture>
        <source type="image/webp" srcset="/assets/cover.webp 1x, /assets/cover@2x.webp 2x" />
        <img class="cover-art" src="/assets/cover.png" srcset="/assets/cover.png 1x, /assets/cover@2x.png 2x" alt="Desirable Properties book cover" />
      </picture>
    </div>
    <p class="tagline">Twenty-two Desirable Properties for the Meta-Layer – community-defined foundations for decentralized digital infrastructure. Tap the cover to begin reading.</p>
    <a class="start" id="startReader" href="/viewer/intro">Open reader →</a>
    <p class="meta">
      <a href="/viewer/intro">Start at DP1</a> ·
      <a href="/viewer/dp-22">DP22 – Memory Stewardship</a> ·
      <a href="/json/desirableproperties-book-manifest.json" target="_blank" rel="noopener">Manifest</a>
    </p>
  </div>
  <script>
    (function () {
      function goReader() {
        window.location.href = '/viewer/intro';
      }
      var hit = document.getElementById('coverHit');
      if (hit) {
        hit.addEventListener('click', goReader);
        hit.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            goReader();
          }
        });
      }
      var btn = document.getElementById('startReader');
      if (btn) btn.addEventListener('click', function (e) {
        // Allow default anchor navigation.
      });
    })();
  </script>
</body>
</html>
