# book.desirableproperties.org — DP book reader + cover
# sudo cp .../nginx/book.desirableproperties.org.conf /etc/nginx/sites-available/
# sudo ln -sf ... /etc/nginx/sites-enabled/
# sudo certbot --nginx -d book.desirableproperties.org

server {
    listen 80;
    listen [::]:80;
    server_name book.desirableproperties.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name book.desirableproperties.org;

    # Expand cert to include book. subdomain after first certbot run:
    # sudo certbot --nginx -d desirableproperties.org -d www.desirableproperties.org -d book.desirableproperties.org
    ssl_certificate     /etc/letsencrypt/live/desirableproperties.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/desirableproperties.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/desirableproperties-book;
    index index.html viewer.htm;

    # Ordinals content proxy (same paths as app.brc333.xyz / metaweb book)
    location /content/ {
        proxy_pass https://ordinals.com/content/;
        proxy_ssl_server_name on;
        proxy_set_header Host ordinals.com;
    }
    location /r/ {
        proxy_pass https://ordinals.com/r/;
        proxy_ssl_server_name on;
        proxy_set_header Host ordinals.com;
    }
    location /inscription/ {
        proxy_pass https://ordinals.com/inscription/;
        proxy_ssl_server_name on;
        proxy_set_header Host ordinals.com;
    }

    # Manifest + JSON data — short cache so the manifest can be updated without restart.
    location /json/ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # Static assets — fingerprinted by path; long cache is fine.
    location /assets/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Cover landing (default root).
    location = / {
        return 302 /index.html;
    }

    # Reader — explicit viewer.htm route.
    location = /viewer.htm {
        try_files $uri =404;
    }

    # Catch-all.
    location / {
        try_files $uri $uri/ =404;
    }
}