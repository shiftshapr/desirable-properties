  <div class="header dp-container dp-container-wide" id="pageHeader">
    <div class="header-inner">
      <h1>
        <a class="header-title-link" href="/viewer/intro">
          The Desirable Properties of a Meta-Layer
        </a>
      </h1>
      <div class="header-tools">
        <button type="button" class="toc-open-btn" id="btnTocOpen" aria-label="Show table of contents" title="Show table of contents">☰ Contents</button>
        <button type="button" id="btnThemeToggle" class="theme-toggle-btn" aria-label="Toggle theme" title="Toggle dark/light theme" aria-pressed="false">
          <span class="theme-icon-dark" aria-hidden="true">☾</span>
          <span class="theme-icon-light" aria-hidden="true">☀</span>
        </button>
        <div class="mode-toggle" role="group" aria-label="Source mode">
          <button type="button" id="modeLive" class="active" title="Read from local working copy (when an override exists)">Live</button>
          <button type="button" id="modeOnchain" title="Read from on-chain ordinals via inscription IDs">Onchain</button>
        </div>
      </div>
      <div class="header-progress" id="headerProgress">
        <span id="headerPartLine">Loading the book…</span>
      </div>
    </div>
  </div>

  <main class="main dp-container dp-container-wide">
    <nav class="sidebar" id="sidebar" aria-label="Table of contents">
      <div class="sidebar-head">
        <h2 class="sidebar-title">
          Contents
          <span class="sidebar-title-meta" id="sidebarTitleMeta">— 23 chapters</span>
        </h2>
        <button type="button" class="sidebar-close" id="btnSidebarClose" aria-label="Hide table of contents" title="Hide table of contents">×</button>
      </div>
      <ul id="toc" role="list"></ul>
    </nav>
    <div class="sidebar-backdrop hidden" id="sidebarBackdrop" aria-hidden="true"></div>

    <div class="reader dp-reader-scroll" id="reader">
      <div id="content">
        <div class="dp-loading loading" role="status" aria-label="Loading">
          <div class="loading-spinner" aria-hidden="true"></div>
        </div>
      </div>
      <div class="nav-bar" id="navBar" style="display:none">
        <button type="button" id="btnPrev" aria-label="Previous chapter">← Previous</button>
        <span id="chapterLabel"></span>
        <button type="button" id="btnNext" aria-label="Next chapter">Next →</button>
      </div>
    </div>
  </main>

  <div id="dpToast" class="dp-toast" role="status" aria-live="polite">
    <span id="dpToastText"></span>
    <button type="button" id="dpToastClose" aria-label="Dismiss notification">×</button>
  </div>

  <script>
  /* ============================================================
   * Desirable Properties book viewer — manifest-driven (sources-sat)
   *
   * Pattern: fetch /json/sources-sat.json at init → TOC built from
   * manifest.sources filtered by manifest.articleRails order.
   * URL routing: /viewer/<railKey> (intro, dp01..dp22).
   * Mode toggle: Live (default; uses src.localOverride if present)
   *              Onchain (fetches /content/<inscriptionId> from ordinals.com
   *              proxy at /content/, so it works on book.desirableproperties.org).
   * Single header at top — no duplicate site-nav at the bottom.
   * ============================================================ */

  (function () {
    'use strict';

    const LS = window.DPLoading;

    const STORAGE_LAST_CHAPTER = 'dp-viewer-last-chapter';
    const STORAGE_TOC_OPEN = 'dp-viewer-toc-open';
    const STORAGE_MODE = 'dp-viewer-mode';
    const STORAGE_THEME = 'dp-viewer-theme';

    const SITE_TITLE = 'The Desirable Properties of a Meta-Layer';
    const MANIFEST_URL = '/json/sources-sat.json';

    /** @type {{protocol:string,operation:string,workId:string,articleRails:string[],sources:Array}} */
    let MANIFEST = null;
    /** RailKey → manifest source entry, in articleRails order (intro first, then dp01..dp22). */
    let RAILS = [];
    /** RailKey → index in RAILS. */
    let RAIL_INDEX = {};
    /** Currently-displayed railKey (one of the RAILS keys; 'ml-draft-026' for intro). */
    let currentRail = null;
    /** 'live' | 'onchain' */
    let currentMode = 'live';

    /* ---------- Utilities ---------- */

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showToast(text, opts) {
      const o = opts || {};
      const variant = o.variant || 'info';
      const ms = o.ms != null ? o.ms : 6000;
      const el = document.getElementById('dpToast');
      const txtEl = document.getElementById('dpToastText');
      if (!el || !txtEl) return;
      txtEl.textContent = text;
      el.className = 'dp-toast is-visible is-' + variant;
      if (showToast._t) clearTimeout(showToast._t);
      showToast._t = setTimeout(function () {
        el.className = 'dp-toast';
      }, ms);
    }

    function isMobileReader() {
      return window.matchMedia('(max-width: 880px)').matches;
    }

    function readTocOpenPreference() {
      try {
        const v = localStorage.getItem(STORAGE_TOC_OPEN);
        if (v === '1' || v === 'true') return true;
        if (v === '0' || v === 'false') return false;
      } catch (e) { /* ignore */ }
      return !isMobileReader();
    }

    function setSidebarOpen(open) {
      const sidebar = document.getElementById('sidebar');
      const backdrop = document.getElementById('sidebarBackdrop');
      if (!sidebar) return;
      sidebar.classList.toggle('hidden', !open);
      if (backdrop) {
        if (isMobileReader()) {
          backdrop.classList.toggle('hidden', !open);
        } else {
          backdrop.classList.add('hidden');
        }
      }
      if (open && isMobileReader()) {
        document.body.classList.add('sidebar-open-mobile');
      } else {
        document.body.classList.remove('sidebar-open-mobile');
      }
      try {
        localStorage.setItem(STORAGE_TOC_OPEN, open ? '1' : '0');
      } catch (e) { /* ignore */ }
    }

    /* ---------- Manifest loading ---------- */

    async function loadManifest() {
      const r = await fetch(MANIFEST_URL, { cache: 'no-cache' });
      if (!r.ok) throw new Error('Failed to load ' + MANIFEST_URL + ' → ' + r.status);
      const m = await r.json();
      if (!m || !Array.isArray(m.sources) || !Array.isArray(m.articleRails)) {
        throw new Error('Invalid sources-sat.json: missing sources/articleRails');
      }
      MANIFEST = m;

      // Build RAILS in articleRails order, dropping book_cover (cover is index.html).
      const byKey = Object.fromEntries(m.sources.map(s => [s.railKey, s]));
      RAILS = m.articleRails
        .map(k => byKey[k])
        .filter(Boolean)
        .filter(s => s.railKey !== 'book_cover')
        .map(s => ({
          railKey: s.railKey,
          label: s.label || s.railKey,
          dp: s.dp || null,
          mlNumber: s.mlNumber || null,
          inscriptionId: s.inscriptionId || null,
          block: s.block || null,
          timestamp: s.timestamp || null,
          status: s.status || null,
          reinscribable: !!s.reinscribable,
          localOverride: s.localOverride || null,
        }));
      RAIL_INDEX = Object.fromEntries(RAILS.map((r, i) => [r.railKey, i]));
      return true;
    }

    function currentModeIsLive() {
      return currentMode === 'live';
    }

    function dpNumberFromRail(rail) {
      if (!rail) return null;
      if (rail === 'ml-draft-026') return null; // intro
      const m = String(rail).match(/^dp(\d{1,2})$/);
      return m ? parseInt(m[1], 10) : null;
    }

    function dpIdFromRail(rail) {
      const n = dpNumberFromRail(rail);
      return n != null ? 'DP' + n : null;
    }

    /**
     * Resolve the requested rail key from the URL.
     * /viewer/intro     → 'ml-draft-026'
     * /viewer/dp01      → 'dp01'
     * /viewer/dp-1      → 'dp01'  (legacy: accept hyphenated form)
     * /viewer/dp1       → 'dp01'
     */
    function getRailKeyFromLocation() {
      const path = window.location.pathname || '';
      const m = path.match(/^\/viewer\/?([^?#]*)/i);
      if (!m) return null;
      let seg = decodeURIComponent(m[1] || '').toLowerCase();
      if (!seg) return null;
      if (seg === 'intro') return 'ml-draft-026';
      let m2 = seg.match(/^dp-?(\d{1,2})$/);
      if (m2) {
        const n = parseInt(m2[1], 10);
        if (n >= 1 && n <= 22) return 'dp' + String(n).padStart(2, '0');
      }
      return seg;
    }

    /* ---------- TOC rendering ---------- */

    function buildToc() {
      const ul = document.getElementById('toc');
      if (!ul) return;
      const items = RAILS.map((r, i) => {
        const dp = r.dp || '';
        const isIntro = r.railKey === 'ml-draft-026';
        const idLabel = isIntro ? 'Intro' : dp;
        // Strip the leading "DP1 – " or "DP1 - " prefix from the label so it
        // doesn't repeat the .dp-toc-id chip.
        const titleText = (r.label || '').replace(
          isIntro ? /^Introduction\s*[–-]\s*/i : /^DP\d+\s*[–-]\s*/i,
          ''
        );
        return (
          '<li>' +
            '<a href="/viewer/' + escapeHtml(r.railKey) + '" data-rail="' + escapeHtml(r.railKey) + '" class="dp-toc-link">' +
              '<span class="dp-toc-row">' +
                '<span class="dp-toc-id">' + escapeHtml(idLabel) + '</span>' +
                '<span class="dp-toc-title">' + escapeHtml(titleText) + '</span>' +
              '</span>' +
            '</a>' +
          '</li>'
        );
      });
      ul.innerHTML = items.join('');

      ul.addEventListener('click', function (e) {
        const a = e.target.closest && e.target.closest('a.dp-toc-link[data-rail]');
        if (!a) return;
        e.preventDefault();
        const rail = a.getAttribute('data-rail');
        if (!rail || !(rail in RAIL_INDEX)) return;
        navigateToRail(rail);
        // Round-3 fix: do NOT close the sidebar on click; user closes via X button.
      });
    }

    function setActiveToc(rail) {
      document.querySelectorAll('#toc a.dp-toc-link').forEach(function (a) {
        a.classList.toggle('active', a.getAttribute('data-rail') === rail);
      });
    }

    function syncUrlToRail(rail) {
      try {
        const target = '/viewer/' + rail;
        if (window.location.pathname !== target) {
          history.pushState({ rail: rail }, document.title, target);
        }
      } catch (e) { /* ignore */ }
    }

    /* ---------- Header progress ---------- */

    function updateHeaderProgress(rail) {
      const el = document.getElementById('headerPartLine');
      if (!el) return;
      const idx = RAIL_INDEX[rail];
      if (idx == null) {
        el.innerHTML = 'Tap the cover or pick a chapter.';
        return;
      }
      const r = RAILS[idx];
      const total = RAILS.length;
      const cur = idx + 1;
      el.innerHTML =
        escapeHtml(r.label) +
        ' <span style="opacity:0.65">· page ' + cur + ' of ' + total + '</span>';
    }

    /* ---------- Markdown rendering ----------
     * Inline renderer (replaces marked.js): handles headings, bold/italic,
     * inline code, links, ordered/unordered lists, blockquotes, horizontal
     * rules, and paragraphs. Output is HTML-escaped first, then run through
     * the inline pass — the post-render sanitizer strips on* handlers.
     */

    function renderInlineMd(s) {
      // Replace inline code FIRST with placeholders so the bold/italic
      // passes do not touch content inside backticks. Restore at the end.
      const codeStash = [];
      let out = escapeHtml(s);
      out = out.replace(/`([^`]+)`/g, (_, code) => {
        codeStash.push(code);
        return '\u0001CODE' + (codeStash.length - 1) + '\u0001';
      });
      // bold **...** or __...__
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      out = out.replace(/__([^_]+)__/g, '<strong>$1</strong>');
      // italic *...* or _..._ (avoid the middle of **/__ already consumed)
      out = out.replace(/(^|[^*\w])\*([^*\n]+)\*/g, '$1<em>$2</em>');
      out = out.replace(/(^|[^_\w])_([^_\n]+)_/g, '$1<em>$2</em>');
      // links [text](url)
      out = out.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, text, href) =>
        '<a href="' + escapeHtml(href) + '" rel="noopener">' + text + '</a>');
      // restore inline code (its content was escapeHtml'd by the leading pass
      // before stashing — so the inner literal text is already safe)
      out = out.replace(/\u0001CODE(\d+)\u0001/g, (_, i) => '<code>' + codeStash[+i] + '</code>');
      return out;
    }

    function renderMarkdown(md) {
      if (md == null || md === '') return '';
      const lines = String(md).replace(/\r\n/g, '\n').split('\n');
      const out = [];
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];

        if (!line.trim()) { i++; continue; }

        if (/^---+\s*$/.test(line)) { out.push('<hr>'); i++; continue; }

        // Headings — also accept backslash-escaped periods (## **1\. Foo**) which
        // ordinals use to suppress list interpretation. Up to 3 leading spaces
        // are tolerated per the GFM spec.
        const HEADING_RE = /^(?: {0,3})(#{1,6})\s+(.*)$/;
        // Strip a leading "**"/"__" (bold), then a "N.", "N\.", "N.N", "N.N.N"
        // style numeric prefix and the space that follows. Then re-prepend the
        // bold marker so the rest of the heading renders cleanly.
        // e.g. "**1\. Problem" -> "**Problem"
        //      "**1.1 The Limits" -> "**The Limits"
        const HEADING_BOLD_PREFIX_RE = /^(\*\*|__)(.*)$/;
        const HEADING_NUM_STRIP_RE = /^(?:\d+(?:\\.|\.))+\d*\s+/;
        const h = line.match(HEADING_RE);
        if (h) {
          const level = h[1].length;
          // Strip leading "1\. " or "1. " inside the heading body so it does
          // not render as raw escaped text. Handle bold-prefixed headings
          // (e.g. "**1\. Problem**") by pulling off the leading **/__ first,
          // stripping the numeric marker, then re-prepending it.
          let body = h[2];
          const bp = body.match(HEADING_BOLD_PREFIX_RE);
          if (bp) {
            body = bp[1] + bp[2].replace(HEADING_NUM_STRIP_RE, '');
          } else {
            body = body.replace(HEADING_NUM_STRIP_RE, '');
          }
          out.push('<h' + level + '>' + renderInlineMd(body) + '</h' + level + '>');
          i++; continue;
        }

        if (/^>\s+/.test(line)) {
          const bq = [];
          while (i < lines.length && /^>\s+/.test(lines[i])) {
            bq.push(lines[i].replace(/^>\s+/, ''));
            i++;
          }
          out.push('<blockquote>' + renderInlineMd(bq.join(' ')) + '</blockquote>');
          continue;
        }

        // Unordered list — also accept up to 3 leading spaces (GFM spec).
        const UL_RE = /^(?: {0,3})[-*]\s+/;
        if (UL_RE.test(line)) {
          const items = [];
          while (i < lines.length && UL_RE.test(lines[i])) {
            items.push('<li>' + renderInlineMd(lines[i].replace(/^(?: {0,3})[-*]\s+/, '')) + '</li>');
            i++;
          }
          out.push('<ul>' + items.join('') + '</ul>');
          continue;
        }

        // Ordered list — also accept backslash-escaped periods (1\. Foo)
        // which ordinals use to suppress list interpretation. Strip the marker.
        // Up to 3 leading spaces are tolerated (GFM spec).
        const OL_RE = /^(?: {0,3})(?:\d+\\.|\d+\.)\s+/;
        const OL_STRIP_RE = /^(?: {0,3})(?:\d+\\.|\d+\.)\s*/;
        if (OL_RE.test(line)) {
          const items = [];
          while (i < lines.length && OL_RE.test(lines[i])) {
            const txt = lines[i].replace(OL_STRIP_RE, '');
            items.push('<li>' + renderInlineMd(txt) + '</li>');
            i++;
          }
          out.push('<ol>' + items.join('') + '</ol>');
          continue;
        }

        // paragraph: consume until blank line or block-level break
        const para = [];
        while (i < lines.length && lines[i].trim()
               && !HEADING_RE.test(lines[i])
               && !/^---+\s*$/.test(lines[i])
               && !UL_RE.test(lines[i])
               && !OL_RE.test(lines[i])
               && !/^>\s+/.test(lines[i])) {
          para.push(lines[i]);
          i++;
        }
        out.push('<p>' + renderInlineMd(para.join(' ')) + '</p>');
      }
      return out.join('\n');
    }

    /**
     * Minimal DOM sanitizer for ordinals content: strip <script>, <style>, and any
     * on* event attributes. DP ordinals are community-written markdown, so basic
     * safety is enough — do not go overboard.
     */
    function sanitizeRenderedHtml(root) {
      // Remove dangerous elements.
      const danger = root.querySelectorAll('script, style, iframe, object, embed');
      danger.forEach((el) => el.parentNode && el.parentNode.removeChild(el));
      // Strip on* event handlers + javascript: URLs.
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_ELEMENT);
      let n = walker.currentNode;
      while (n) {
        if (n.attributes) {
          for (let i = n.attributes.length - 1; i >= 0; i--) {
            const a = n.attributes[i];
            if (/^on/i.test(a.name)) n.removeAttribute(a.name);
            else if ((a.name === 'href' || a.name === 'src') && /^\s*javascript:/i.test(a.value)) {
              n.removeAttribute(a.name);
            }
          }
        }
        n = walker.nextNode();
      }
    }

    function renderChapterMarkdown(md) {
      const tpl = document.createElement('template');
      tpl.innerHTML = renderMarkdown(md);
      sanitizeRenderedHtml(tpl.content);
      return tpl.innerHTML;
    }

    function renderIntroLanding() {
      return (
        '<div class="book-content dp-intro" data-dp-content-root="1">' +
          '<h1>The Desirable Properties of a Meta-Layer</h1>' +
          '<p class="dp-intro-eyebrow">A Book of the Meta-Layer · 22 Properties, inscribed on Bitcoin</p>' +
          '<p>This book collects twenty-two community-defined Desirable Properties for the Meta-Layer — the foundations of a decentralized, human-meaningful internet. They emerged from open submissions during the Desirable Properties Challenge, were inscribed on Bitcoin, and are now available to read here in the order they were inscribed.</p>' +
          '<p>Read them in order, jump around, or follow the threads that interest you. Each chapter stands on its own — but they are strongest when seen together.</p>' +
          '<div class="dp-intro-actions">' +
            '<a class="dp-intro-start" href="/viewer/dp01">Start at DP1 →</a>' +
            '<a class="dp-intro-back" href="/">Back to cover</a>' +
          '</div>' +
        '</div>'
      );
    }

    /* ---------- Chapter loading ---------- */

    async function fetchOnchainMarkdown(inscriptionId) {
      // Prefer the local /content/ proxy (same nginx server, faster + avoids CORS).
      const url = '/content/' + inscriptionId;
      const r = await fetch(url, { cache: 'no-cache' });
      if (!r.ok) throw new Error('Onchain fetch failed (' + r.status + '): ' + inscriptionId);
      return await r.text();
    }

    async function fetchLocalOverride(overridePath) {
      const r = await fetch(overridePath, { cache: 'no-cache' });
      if (!r.ok) throw new Error('Local override fetch failed (' + r.status + '): ' + overridePath);
      return await r.text();
    }

    async function loadChapterBody(rail) {
      const idx = RAIL_INDEX[rail];
      if (idx == null) throw new Error('Unknown rail: ' + rail);
      const r = RAILS[idx];

      if (currentModeIsLive() && r.localOverride) {
        const md = await fetchLocalOverride(r.localOverride);
        return { html: renderChapterMarkdown(md), source: 'local' };
      }
      // Onchain: always fetch (Live w/o override falls through to onchain).
      if (!r.inscriptionId) {
        throw new Error('No inscriptionId for rail: ' + rail);
      }
      const md = await fetchOnchainMarkdown(r.inscriptionId);
      return { html: renderChapterMarkdown(md), source: 'onchain' };
    }

    function getNeighborRails(rail) {
      const idx = RAIL_INDEX[rail];
      if (idx == null) return { prev: null, next: null };
      return {
        prev: idx > 0 ? RAILS[idx - 1].railKey : null,
        next: idx < RAILS.length - 1 ? RAILS[idx + 1].railKey : null,
      };
    }

    function buildInscriptionRailHtml(rail) {
      const idx = RAIL_INDEX[rail];
      if (idx == null) return '';
      const r = RAILS[idx];
      if (!r.inscriptionId) return '';
      const insId = r.inscriptionId;
      const ordinalsHref = 'https://ordinals.com/inscription/' + insId;
      const shortId = insId.length > 18 ? insId.slice(0, 14) + '…' + insId.slice(-4) : insId;
      return (
        '<div class="ordinal-meta">' +
          'Inscription: ' +
          '<a href="' + ordinalsHref + '" target="_blank" rel="noopener">' + escapeHtml(shortId) + '</a>' +
          (r.mlNumber ? ' · ' + escapeHtml(r.mlNumber) : '') +
          (r.block ? ' · block ' + r.block : '') +
        '</div>'
      );
    }

    function buildNavBarHtml(rail) {
      const idx = RAIL_INDEX[rail];
      if (idx == null) return '';
      const r = RAILS[idx];
      const { prev, next } = getNeighborRails(rail);
      const prevLabel = prev === 'ml-draft-026' ? 'Introduction' : (prev ? (RAILS[RAIL_INDEX[prev]].dp || 'Prev') : '');
      const nextLabel = next ? (RAILS[RAIL_INDEX[next]].dp || 'Next') : '';
      return (
        '<div class="nav-bar" id="navBar">' +
          (prev
            ? '<button type="button" id="btnPrev" data-rail="' + escapeHtml(prev) + '" aria-label="Previous chapter">← ' + escapeHtml(prevLabel) + '</button>'
            : '<button type="button" id="btnPrev" disabled aria-label="Previous chapter">← Previous</button>'
          ) +
          '<span id="chapterLabel">' +
            (r.dp ? '<strong>' + escapeHtml(r.dp) + '</strong> · ' : '') +
            'page ' + (idx + 1) + ' of ' + RAILS.length +
          '</span>' +
          (next
            ? '<button type="button" id="btnNext" data-rail="' + escapeHtml(next) + '" aria-label="Next chapter">' + escapeHtml(nextLabel) + ' →</button>'
            : '<button type="button" id="btnNext" disabled aria-label="Next chapter">Next →</button>'
          ) +
        '</div>'
      );
    }

    async function loadChapter(rail, opts) {
      const o = opts || {};
      if (!(rail in RAIL_INDEX)) {
        // Unknown rail → fall through to intro.
        rail = 'ml-draft-026';
      }
      currentRail = rail;

      const contentEl = document.getElementById('content');
      if (contentEl) contentEl.innerHTML = LS ? LS.html('loading') :
        '<div class="dp-loading"><div class="loading-spinner"></div></div>';

      try {
        let bodyHtml;
        if (rail === 'ml-draft-026') {
          // Intro is a static landing page; do not fetch inscription for it.
          bodyHtml = renderIntroLanding();
        } else {
          const result = await loadChapterBody(rail);
          bodyHtml = '<div class="book-content" data-dp-content-root="1">' + result.html + '</div>';
        }
        const navHtml = buildNavBarHtml(rail);
        const metaHtml = buildInscriptionRailHtml(rail);

        contentEl.innerHTML = bodyHtml + navHtml + metaHtml;

        // Wire up prev/next buttons.
        const prevBtn = document.getElementById('btnPrev');
        const nextBtn = document.getElementById('btnNext');
        if (prevBtn && !prevBtn.disabled) {
          prevBtn.addEventListener('click', function () {
            const r = prevBtn.getAttribute('data-rail');
            if (r) navigateToRail(r);
          });
        }
        if (nextBtn && !nextBtn.disabled) {
          nextBtn.addEventListener('click', function () {
            const r = nextBtn.getAttribute('data-rail');
            if (r) navigateToRail(r);
          });
        }

        setActiveToc(rail);
        updateHeaderProgress(rail);
        try { localStorage.setItem(STORAGE_LAST_CHAPTER, rail); } catch (e) { /* ignore */ }
        if (!o.skipUrl) syncUrlToRail(rail);
      } catch (err) {
        const msg = (err && err.message ? err.message : String(err))
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/\n/g, '<br>');
        contentEl.innerHTML = '<div class="error">Failed to load chapter: ' + msg + '</div>';
      }
    }

    async function navigateToRail(rail) {
      if (!(rail in RAIL_INDEX)) return;
      await loadChapter(rail);
    }

    /* ---------- Mode toggle (Live / Onchain) ---------- */

    function setMode(mode) {
      currentMode = mode === 'onchain' ? 'onchain' : 'live';
      try { localStorage.setItem(STORAGE_MODE, currentMode); } catch (e) { /* ignore */ }

      const liveBtn = document.getElementById('modeLive');
      const onchainBtn = document.getElementById('modeOnchain');
      if (liveBtn) liveBtn.classList.toggle('active', currentMode === 'live');
      if (onchainBtn) onchainBtn.classList.toggle('active', currentMode === 'onchain');

      if (currentMode === 'onchain' && currentRail) {
        loadChapter(currentRail, { skipUrl: true });
      }
    }

    /* ---------- Theme toggle (dark/light) ---------- */

    (function initThemeToggle() {
      const root = document.documentElement;
      function applyTheme(t) {
        root.setAttribute('data-theme', t);
        const btn = document.getElementById('btnThemeToggle');
        if (btn) btn.setAttribute('aria-pressed', t === 'light' ? 'true' : 'false');
      }
      let saved = null;
      try { saved = localStorage.getItem(STORAGE_THEME); } catch (_) { /* ignore */ }
      applyTheme(saved === 'light' ? 'light' : 'dark');
      const btn = document.getElementById('btnThemeToggle');
      if (btn) {
        btn.addEventListener('click', function () {
          const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
          try { localStorage.setItem(STORAGE_THEME, next); } catch (_) { /* ignore */ }
          applyTheme(next);
        });
      }
    })();

    /* ---------- Init ---------- */

    async function init() {
      // Sidebar open / close.
      const openBtn = document.getElementById('btnTocOpen');
      const closeBtnSide = document.getElementById('btnSidebarClose');
      const backdrop = document.getElementById('sidebarBackdrop');
      if (openBtn) openBtn.addEventListener('click', function () { setSidebarOpen(true); });
      if (closeBtnSide) closeBtnSide.addEventListener('click', function () { setSidebarOpen(false); });
      if (backdrop) backdrop.addEventListener('click', function () {
        if (isMobileReader()) setSidebarOpen(false);
      });

      // Toast close.
      const toastClose = document.getElementById('dpToastClose');
      if (toastClose) toastClose.addEventListener('click', function () {
        const t = document.getElementById('dpToast');
        if (t) t.className = 'dp-toast';
      });

      // Mode toggle.
      const liveBtn = document.getElementById('modeLive');
      const onchainBtn = document.getElementById('modeOnchain');
      if (liveBtn) liveBtn.addEventListener('click', function () { setMode('live'); });
      if (onchainBtn) onchainBtn.addEventListener('click', function () { setMode('onchain'); });

      // Keyboard nav.
      document.addEventListener('keydown', function (e) {
        const tag = (e.target && e.target.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea') return;
        if (currentRail === 'ml-draft-026') {
          if (e.key === 'ArrowRight' && RAIL_INDEX['dp01'] != null) {
            navigateToRail('dp01');
          }
          return;
        }
        if (e.key === 'ArrowLeft' && currentRail) {
          const idx = RAIL_INDEX[currentRail];
          if (idx > 0) navigateToRail(RAILS[idx - 1].railKey);
        } else if (e.key === 'ArrowRight' && currentRail) {
          const idx = RAIL_INDEX[currentRail];
          if (idx < RAILS.length - 1) navigateToRail(RAILS[idx + 1].railKey);
        }
      });

      // Load manifest.
      try {
        await loadManifest();
      } catch (err) {
        const contentEl = document.getElementById('content');
        if (contentEl) {
          contentEl.innerHTML =
            '<div class="error">Failed to load <code>' + escapeHtml(MANIFEST_URL) + '</code>: ' +
            escapeHtml(err && err.message || String(err)) + '</div>';
        }
        return;
      }

      // Update sidebar meta.
      const meta = document.getElementById('sidebarTitleMeta');
      if (meta) {
        const introCount = RAILS.some(r => r.railKey === 'ml-draft-026') ? 1 : 0;
        const dpCount = RAILS.length - introCount;
        meta.textContent = '— ' + (introCount + dpCount) + ' chapters';
      }

      // Mode from storage.
      let savedMode = 'live';
      try {
        const stored = localStorage.getItem(STORAGE_MODE);
        if (stored === 'onchain') savedMode = 'onchain';
      } catch (e) { /* ignore */ }
      setMode(savedMode);

      // Build TOC.
      buildToc();

      // Sidebar default.
      setSidebarOpen(readTocOpenPreference());

      // Decide which chapter to show.
      let rail = getRailKeyFromLocation();
      if (!rail || !(rail in RAIL_INDEX)) {
        // Try last-read from storage, else intro.
        let saved = null;
        try { saved = localStorage.getItem(STORAGE_LAST_CHAPTER); } catch (e) { /* ignore */ }
        if (saved && saved in RAIL_INDEX) {
          rail = saved;
        } else {
          rail = 'ml-draft-026';
        }
      }
      await loadChapter(rail, { skipUrl: true });
    }

    // History popstate (back/forward) — load chapter from URL.
    window.addEventListener('popstate', function () {
      const rail = getRailKeyFromLocation();
      if (rail && rail in RAIL_INDEX) {
        loadChapter(rail, { skipUrl: true });
      }
    });

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
