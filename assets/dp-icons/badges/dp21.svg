<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-labelledby="t">
  <title id="t">DP21 — Mm — Multi-modal</title>
  <!-- white background -->
  <rect width="600" height="600" fill="#ffffff"/>
  <!-- gold outer frame (brand) -->
  <rect x="8" y="8" width="584" height="584" rx="14" fill="none" stroke="#b8860b" stroke-width="6"/>
  <!-- subtle inner gold border for depth -->
  <rect x="22" y="22" width="556" height="556" rx="8" fill="none" stroke="#b8860b" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- DPnn label, top-left, gold (brand) -->
  <text x="56" y="100" font-family='Inter, "SF Pro Text", "Segoe UI", system-ui, sans-serif' font-size="64" font-weight="700" fill="#b8860b" letter-spacing="-1">DP21</text>
  <!-- 2-letter code, top-right, family color -->
  <text x="544" y="100" font-family='Inter, "SF Pro Text", "Segoe UI", system-ui, sans-serif' font-size="48" font-weight="700" fill="#d946ef" text-anchor="end" letter-spacing="2">Mm</text>
  <!-- icon at 60,150 → 540,490 (480x480) -->
  <svg x="60" y="150" width="480" height="480" viewBox="0 0 24 24" fill="none">
    <rect x="1.0" y="1.0" width="22" height="22" rx="2.4" fill="#f5e9c8" fill-opacity="0.04" stroke="#b8860b" stroke-width="0.18"/>
  <rect x="3"  y="10" width="2" height="4" rx="1" fill="#d946ef" stroke="none"/><rect x="6"  y="7"  width="2" height="10" rx="1" fill="#d946ef" stroke="none"/><rect x="9"  y="4"  width="2" height="16" rx="1" fill="#d946ef" stroke="none"/><rect x="12" y="6"  width="2" height="12" rx="1" fill="#d946ef" stroke="none"/><rect x="15" y="9"  width="2" height="6" rx="1" fill="#d946ef" stroke="none"/><rect x="18" y="11" width="2" height="2" rx="1" fill="#d946ef" stroke="none"/>
  </svg>
  <!-- short title, bottom, neutral gray -->
  <text x="300" y="538" font-family='Inter, "SF Pro Text", "Segoe UI", system-ui, sans-serif' font-size="22" font-weight="500" fill="#6b7280" text-anchor="middle">Multi-modal</text>
  <!-- group label, small caps, gold -->
  <text x="300" y="510" font-family='Inter, "SF Pro Text", "Segoe UI", system-ui, sans-serif' font-size="13" font-weight="600" fill="#b8860b" text-anchor="middle" letter-spacing="2.5">INTEROP</text>
